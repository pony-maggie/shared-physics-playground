name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make scripts executable
        run: chmod +x harness/*.sh scripts/*.sh
      - name: Harness verify
        run: ./harness/verify.sh
      - name: Harness smoke
        run: ./harness/smoke.sh
