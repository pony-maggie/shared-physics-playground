name: Deploy Shared Physics Playground

on:
  workflow_dispatch:

concurrency:
  group: shared-physics-playground-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
    env:
      APP_DIR: /opt/shared_physics_playground/app
      IMAGE_NAME: ghcr.io/pony-maggie/shared-physics-playground
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy deployment assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          overwrite: true
          source: deploy/docker-compose.prod.yml,deploy/deploy.sh,deploy/env.production.example,deploy/Caddyfile.pyhsics.lucasma.cc
          strip_components: 1
          target: ${{ env.APP_DIR }}

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ env.APP_DIR }}
          APP_IMAGE_TAG: ${{ github.sha }}
          GHCR_IMAGE: ${{ env.IMAGE_NAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          envs: APP_DIR,APP_IMAGE_TAG,GHCR_IMAGE,GHCR_PULL_TOKEN,GHCR_USERNAME
          script: |
            bash <<'EOF'
            set -euo pipefail
            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"
            test -f .env || { echo "Missing ${APP_DIR}/.env"; exit 1; }
            test -f config/playground-access.json || { echo "Missing ${APP_DIR}/config/playground-access.json"; exit 1; }
            test -n "${GHCR_USERNAME}" || { echo "Missing GHCR_USERNAME secret"; exit 1; }
            test -n "${GHCR_PULL_TOKEN}" || { echo "Missing GHCR_PULL_TOKEN secret"; exit 1; }

            update_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                printf '%s=%s\n' "${key}" "${value}" >> .env
              fi
            }

            printf '%s\n' "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            update_env GHCR_IMAGE "${GHCR_IMAGE}"
            update_env APP_IMAGE_TAG "${APP_IMAGE_TAG}"
            chmod +x deploy.sh
            ./deploy.sh
            EOF
